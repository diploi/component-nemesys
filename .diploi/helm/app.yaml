apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
spec:
  selector:
    matchLabels:
      app: app
  strategy:
  {{- if eq .Values.stage "development"}}
    type: Recreate
  {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # keep the OLD pod serving until the NEW one is Ready
      maxSurge: 1         # 0-unavailable + 1-surge = zero-downtime even at 1 replica
  {{- end }}
  replicas: {{ ternary 1 0 .Values.enabled }}
  template:
    metadata:
      labels:
        app: app
    spec:
      terminationGracePeriodSeconds: 30   # room for the preStop drain + Hapi connection drain
      imagePullSecrets:
        - name: diploi-pull-secret
      {{- if eq .Values.stage "development" }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: install-dependencies
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          command:
            - npm
            - install
          workingDir: /app{{ .Values.folder }}
          volumeMounts:
            - name: app-mount
              mountPath: /app
      {{- end }}
      containers:
        - name: app
          image: {{ .Values.images.app }}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          {{- if .Values.hosts.app }}
          # Probes only for components that actually bind :3000 (API, Web). The
          # Migrator declares `hosts: []` and serves no HTTP — HTTP probes would
          # fail it forever, so this whole block is gated out for it.

          # startupProbe gates liveness+readiness during boot. ~2.5 min budget for
          # the main process to listen (Hapi/Vite up + DB/Redis connect). The app
          # serves WITHOUT subapps (sync finishes in the background after this
          # passes), so do NOT size this to subapp builds.
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 3000
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3

          # readinessProbe = "send me traffic": up AND not draining. NOT gated on
          # Postgres/Redis/subapps — on one replica a dependency blip or a broken
          # subapp must not yank the only endpoint. This is the zero-downtime
          # rollout gate and the shutdown drain signal.
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 3000
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3

          # livenessProbe = "restart me if wedged": forgiving (~60s) so a busy
          # moment never false-kills the single replica; answered from the main
          # event loop, so it only trips on a real deadlock (or /tmp/app.unhealthy).
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 3000
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5

          # preStop: flip readiness to 503 first so k8s removes this pod from the
          # Service and in-flight requests drain, THEN SIGTERM. sleep < grace period.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "touch /tmp/app.draining; sleep 8"]
          {{- end }}

          {{- if eq .Values.stage "development" }}
          workingDir: /app{{ .Values.folder }}
          {{- with .Values.containerCommands.developmentStart }}
          command:
            - /bin/sh
            - -c
            - |
          {{ . | nindent 14 }}
          {{- end }}
          {{- else }}
          {{- with .Values.containerCommands.productionStart }}
          command:
            - /bin/sh
            - -c
            - |
          {{ . | nindent 14 }}
          {{- end }}
          {{- end }}
          env:
            {{- range .Values.env }}
            - name: {{ .identifier }}
              value: {{ .value | quote }}
            {{- end }}
            - name: APP_PUBLIC_URL
              value: {{ .Values.hosts.app }}
            - name: STAGE
              value: {{ .Values.stage }}
          volumeMounts:
            {{- if hasKey .Values.storage "code" }}
            - name: app-mount
              mountPath: /app
            {{- end }}
      volumes:
        {{- if hasKey .Values.storage "code" }}
        - name: app-mount
          hostPath:
            path: {{ .Values.storage.code.hostPath }}
        {{- end }}